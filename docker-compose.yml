services:
  mysql:
    image: mysql:9
    restart: always
    container_name: mysql-${APP_NAME}
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/my.cnf
    ports:
      - "127.0.0.1:${DB_PORT}:3306"
    environment:
      - "MYSQL_ROOT_PASSWORD=${DB_PASSWORD}"
      - "MYSQL_DATABASE=${DB_DATABASE}"
    command: --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s
    networks:
      - processing-network

  redis:
    image: redis:8.6
    restart: always
    container_name: redis-${APP_NAME}
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - ./docker/redis/data:/data
    networks:
      - processing-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    container_name: pma-${APP_NAME}
    environment:
      - "PMA_HOST=mysql"
      - "PMA_PORT=3306"
      - "UPLOAD_LIMIT=100M"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - processing-network

  nginx-pma-proxy:
    image: nginx:1.26-alpine
    restart: always
    container_name: nginx-pma-${APP_NAME}
    ports:
      - "${PMA_PORT}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - phpmyadmin
    networks:
      - processing-network

networks:
  processing-network:
    driver: bridge
